app:
  security:
    cors:
      allowed-origins: ${APP_SECURITY_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      access-token-expiration-ms: 900000 # 15 minutes
      refresh-token-expiration-ms: 604800000 # 7 days
      register-expiration-ms: 900000 # 15 minutes
      cookie-path: /api/v1/auth
      cookie-domain: localhost
    otp:
      validity-minutes: 5
      max-failed-attempts: 5
    recaptcha:
      enabled: ${APP_SECURITY_RECAPTCHA_ENABLED:true}
      secret-key: ${RECAPCHA_SECRETS_KEY}
      verify-url: https://www.google.com/recaptcha/api/siteverify

spring:
  application:
    name: ticket-hunting
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true # Tự động tạo bảng lịch sử nếu DB đã có dữ liệu từ trước

  jpa:
    hibernate:
      # Use 'update' temporarily to allow Hibernate to create missing tables
      # before Flyway manages them in the future.
      ddl-auto: update
    show-sql: true # Bật lên để thấy câu lệnh SQL nó chạy ngầm